<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart City Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Animated glowing background */
body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background: radial-gradient(circle,#00ffcc,transparent);
top:-100px;
left:-100px;
animation: move 6s infinite alternate;
filter: blur(120px);
}
body::after{
content:'';
position:absolute;
width:500px;
height:500px;
background: radial-gradient(circle,#00aaff,transparent);
bottom:-100px;
right:-100px;
animation: move 6s infinite alternate-reverse;
filter: blur(120px);
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(80px,80px);}
}

/* Glass card */
.login-box{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
padding:40px;
border-radius:20px;
width:340px;
text-align:center;
box-shadow:0 0 40px rgba(0,255,200,0.2);
animation: fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.login-box h2{
color:#fff;
margin-bottom:25px;
}

/* Input */
.input-box{
position:relative;
margin:15px 0;
}

.input-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.15);
color:#fff;
outline:none;
}

.input-box label{
position:absolute;
top:50%;
left:12px;
color:#ccc;
font-size:14px;
transform:translateY(-50%);
pointer-events:none;
transition:0.3s;
}

.input-box input:focus + label,
.input-box input:valid + label{
top:-8px;
font-size:12px;
color:#00ffcc;
}

/* Button */
.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00ffcc,#00aaff);
color:#000;
font-weight:700;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

.login-box button:hover{
transform:scale(1.05);
}

/* Google button */
.google-btn{
background:#fff;
color:#000;
margin-top:10px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
cursor:pointer;
}

.google-btn img{
width:20px;
}

/* Message */
#msg{
color:#ffeb3b;
margin-top:10px;
}

/* Floating icons */
.icon{
position:absolute;
font-size:30px;
opacity:0.2;
animation: float 6s infinite;
}

.icon:nth-child(1){top:10%;left:20%;}
.icon:nth-child(2){top:80%;left:70%;}
.icon:nth-child(3){top:50%;left:10%;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-30px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div class="icon">🌆</div>
<div class="icon">🚦</div>
<div class="icon">🏙</div>

<div class="login-box">
<h2>🌍 Smart City Login</h2>

<div class="input-box">
<input id="name" required>
<label>Name</label>
</div>

<div class="input-box">
<input id="phone" required>
<label>Phone Number</label>
</div>

<button onclick="login()">Login</button>

<!-- Google Login -->
<button class="google-btn" onclick="googleLogin()">
<img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
Login with Google
</button>

<p id="msg"></p>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = function(){
signInWithPopup(auth, provider)
.then((result)=>{
const user = result.user;
localStorage.setItem("username", user.displayName);
localStorage.setItem("useremail", user.email);
window.location="index.html";
})
.catch((error)=>{
document.getElementById("msg").innerText="Google login error";
});
}
</script>

<script>
function login(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(name=="" || phone==""){
document.getElementById("msg").innerHTML="⚠ Enter details";
}else{
localStorage.setItem("username",name);
localStorage.setItem("userphone",phone);
window.location="index.html";
let audio = new Audio("https://www.fesliyanstudios.com/play-mp3/387");
audio.play();
}
}
</script>

</body>
</html>
