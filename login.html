<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart City Login</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* General Reset */
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}

  /* Body with background image and overlay */
  body{
    height:100vh;
    background:url('images/madurai-city.jpg') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
  }

  /* Overlay for darker contrast */
  body::before{
    content:'';
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.5);
    z-index:0;
  }

  /* Login Box */
  .login-box{
    position:relative;
    z-index:1;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:50px 40px;
    border-radius:20px;
    width:360px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    animation: floatLogin 3s infinite alternate;
    transition: transform 0.3s ease;
  }

  @keyframes floatLogin{
    0%{transform:translateY(0px);}
    100%{transform:translateY(-15px);}
  }

  .login-box:hover{
    transform: translateY(-10px) scale(1.02);
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
  }

  /* Headings */
  .login-box h2{
    color:#fff;
    margin-bottom:30px;
    font-size:28px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* Inputs */
  .login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:16px;
    background: rgba(255,255,255,0.25);
    color:#fff;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }
  .login-box input::placeholder{
    color: rgba(255,255,255,0.7);
  }

  /* Button */
  .login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1e7f4f,#3fc67d);
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .login-box button:hover{
    transform:scale(1.05);
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
  }

  /* Message */
  #msg{
    color:#ffeb3b;
    margin-top:10px;
    font-weight:600;
  }

  /* Floating shapes */
  .shape{
    position:absolute;
    width:50px; height:50px;
    background:rgba(30,127,79,0.4);
    border-radius:50%;
    animation: floatShape 6s ease-in-out infinite;
    z-index:0;
  }
  .shape:nth-child(1){top:10%; left:15%; animation-delay:0s;}
  .shape:nth-child(2){top:70%; left:25%; animation-delay:2s;}
  .shape:nth-child(3){top:40%; left:80%; animation-delay:4s;}
  .shape:nth-child(4){top:85%; left:60%; animation-delay:1s;}

  @keyframes floatShape{
    0%{transform: translateY(0px);}
    50%{transform: translateY(-30px);}
    100%{transform: translateY(0px);}
  }
</style>
</head>
<body>

<!-- Floating Shapes -->
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>

<div class="login-box">
  <h2>🌍 Smart City Login</h2>
  <input id="name" placeholder="Enter Name">
  <input id="phone" placeholder="Enter Phone Number">
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<script>
function login(){
    let name=document.getElementById("name").value;
    let phone=document.getElementById("phone").value;
    if(name=="" || phone==""){
        document.getElementById("msg").innerHTML="⚠ Enter name and phone";
    }else{
        localStorage.setItem("username",name);
        localStorage.setItem("userphone",phone);
        window.location="index.html";
    }
}
</script>
</body>
</html>
